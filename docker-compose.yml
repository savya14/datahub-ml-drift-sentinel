# DataHub ML Drift Sentinel — Full Stack
# Combines the FastAPI drift-sentinel backend with a local DataHub instance.
# Usage:
#   docker compose up -d
#   (wait ~2 min for DataHub to initialize)
#   curl http://localhost:8000/models

version: "3.9"

services:
  # ───────────────────────── DataHub Infrastructure ─────────────────────────

  mysql:
    image: mysql:8.2
    environment:
      MYSQL_ROOT_PASSWORD: datahub
      MYSQL_DATABASE: datahub
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdatahub"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'cluster_name'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-broker:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ────────────────────────── DataHub Services ──────────────────────────

  datahub-gms:
    image: acryldata/datahub-gms:v0.14.0.2
    depends_on:
      mysql:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    environment:
      EBEAN_DATASOURCE_URL: jdbc:mysql://mysql:3306/datahub?useSSL=false&allowPublicKeyRetrieval=true
      EBEAN_DATASOURCE_USERNAME: root
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: kafka-broker:9092
      ELASTICSEARCH_HOST: opensearch
      ELASTICSEARCH_PORT: "9200"
      GRAPH_SERVICE_IMPL: elasticsearch
      ENTITY_SERVICE_IMPL: ebean
      SEARCH_SERVICE_IMPL: elasticsearch
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:8080/health | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  datahub-frontend:
    image: acryldata/datahub-frontend-react:v0.14.0.2
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SECRET: YouKnowNothing
      DATAHUB_APP_VERSION: "1.0"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: 10MB
    ports:
      - "9002:9002"

  datahub-actions:
    image: acryldata/datahub-actions:v0.1.1
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_URL: http://datahub-gms:8080
      KAFKA_BOOTSTRAP_SERVER: kafka-broker:9092

  # ───────────────── Drift Sentinel Backend ─────────────────

  drift-sentinel-api:
    build: .
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_URL: http://datahub-gms:8080
      DATAHUB_GMS_TOKEN: ""
      ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"

volumes:
  mysql-data:
  opensearch-data:
